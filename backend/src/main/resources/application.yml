server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/personal_resume?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1006}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:none}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-to-at-least-32-characters}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:1440}
  admin:
    default-username: ${APP_ADMIN_DEFAULT_USERNAME:admin}
    default-password: ${APP_ADMIN_DEFAULT_PASSWORD:admin123}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:63342,http://127.0.0.1:63342}