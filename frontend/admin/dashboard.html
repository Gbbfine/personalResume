<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/admin.css" />
</head>
<body>
  <header class="admin-header">
    <h1>个人简历后台</h1>
    <div class="header-actions">
      <button id="apiBaseBtn" class="ghost">设置 API 地址</button>
      <button id="logoutBtn" class="danger">退出</button>
    </div>
  </header>

  <div class="layout">
    <aside id="moduleNav" class="sidebar"></aside>

    <main class="content">
      <section>
        <h2 id="moduleTitle"></h2>
        <p class="tip">先点“编辑”再修改并保存；不填 ID 时默认新增。</p>
      </section>

      <section class="panel">
        <h3>数据列表</h3>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h3 id="formTitle">新增</h3>
        <form id="entityForm" class="grid-form"></form>
      </section>

      <p id="toast" class="toast"></p>
    </main>
  </div>

  <script type="module" src="./assets/js/dashboard.js"></script>
</body>
</html>
