<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/admin.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>管理后台登录</h1>
    <p>默认账号：admin / admin123</p>
    <form id="loginForm">
      <label>
        用户名
        <input id="username" type="text" required value="admin" />
      </label>
      <label>
        密码
        <input id="password" type="password" required value="admin123" />
      </label>
      <button type="submit">登录</button>
    </form>
    <p id="message" class="msg"></p>
  </main>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
